name: Verify GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify static files exist
        run: |
          test -f insights-mforge/index.html
          test -f insights-mforge/app.js
          test -f insights-mforge/scripts/encrypt-dashboard.mjs
      - name: Wait for GitHub Pages to serve this commit
        run: |
          url="https://mforgedesign.github.io/ProjetosAvulsos/insights-mforge/?v=${GITHUB_SHA}"
          for i in $(seq 1 30); do
            code=$(curl -L -s -o /tmp/page.html -w '%{http_code}' "$url" || true)
            if [ "$code" = "200" ] && grep -q 'Radar MForge' /tmp/page.html; then
              echo "Pages online: $url"
              exit 0
            fi
            sleep 10
          done
          echo "Pages did not serve expected panel in time" >&2
          exit 1
